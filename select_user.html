<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#667eea" />
  <title>Kanban v2 - Google Sheets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }

    .sync-status {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: center;
    }
    .sync-status.syncing { color: #ff9800; }
    .sync-status.ready { color: #4caf50; }
    .sync-status.error { color: #ff5252; }

    .user-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .user-card {
      background: #f5f7fa;
      border: 2px solid #e1e5eb;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .user-card:active {
      transform: scale(0.98);
    }

    .user-card:hover,
    .user-card.touch-hover {
      border-color: #667eea;
      background: #f0f4ff;
      transform: translateY(-2px);
    }

    .user-card.selected {
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
    }

    .user-card.selected .user-avatar {
      background: rgba(255,255,255,0.3);
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .user-card.selected .user-name {
      color: white;
    }

    .user-role {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .user-card.selected .user-role {
      color: rgba(255,255,255,0.8);
    }

    .user-actions {
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .user-card:hover .user-actions,
    .user-card.selected .user-actions,
    .user-card.touch-hover .user-actions {
      opacity: 1;
      pointer-events: auto;
    }

    .user-action-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-edit {
      background: #e3f2fd;
      color: #1976d2;
    }

    .btn-edit:hover {
      background: #1976d2;
      color: white;
    }

    .btn-delete {
      background: #ffebee;
      color: #c62828;
    }

    .btn-delete:hover {
      background: #c62828;
      color: white;
    }

    .user-card.selected .btn-edit,
    .user-card.selected .btn-delete {
      background: rgba(255,255,255,0.3);
      color: white;
    }

    .add-user-btn {
      width: 100%;
      padding: 16px;
      border: 2px dashed #ccc;
      border-radius: 12px;
      background: transparent;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-user-btn:hover {
      border-color: #667eea;
      color: #667eea;
      background: #f0f4ff;
    }

    .continue-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.5;
      pointer-events: none;
    }

    .continue-btn.active {
      opacity: 1;
      pointer-events: auto;
    }

    .continue-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .admin-link {
      text-align: center;
      margin-top: 20px;
    }

    .admin-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }

    .admin-link a:hover {
      text-decoration: underline;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e1e5eb;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn-cancel {
      background: #f5f7fa;
      color: #666;
    }

    .modal-btn-cancel:hover {
      background: #e1e5eb;
    }

    .modal-btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .modal-btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Kanban Board v2</h1>
      <p>Выберите пользователя для продолжения</p>
      <div class="sync-status" id="syncStatus">🔄 Загрузка...</div>
    </div>

    <div id="userListContainer">
      <div class="loading">Загрузка...</div>
    </div>

    <button class="add-user-btn" onclick="openAddUserModal()">
      <span>➕</span> Добавить пользователя
    </button>

    <button class="continue-btn" id="continueBtn" onclick="continueToBoard()">
      Продолжить →
    </button>

    <div class="admin-link">
      <a href="admin.html">🔧 Админская панель</a>
    </div>
  </div>

  <!-- Add/Edit User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">Новый пользователь</div>
      
      <div class="form-group">
        <label for="userName">Имя *</label>
        <input type="text" id="userName" placeholder="Введите имя" />
      </div>
      
      <div class="form-group">
        <label for="userTelegram">Telegram (необязательно)</label>
        <input type="text" id="userTelegram" placeholder="@username" />
      </div>
      
      <div class="form-group">
        <label for="userRole">Роль</label>
        <select id="userRole">
          <option value="user">Пользователь</option>
          <option value="admin">Админ</option>
        </select>
      </div>

      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeUserModal()">Отмена</button>
        <button class="modal-btn modal-btn-save" onclick="saveUser()">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    // ===== GOOGLE SHEETS API CONFIGURATION =====
    window.onerror = function(msg, url, line, col, error) {
      alert('JS Error: ' + msg + ' line:' + line);
      return true;
    };
    
    alert('JS starting select_user');
    
    var API_URL = 'https://script.google.com/macros/s/AKfycbwOmfbiY6qcoZtJJFyazXATEQKiVakQoFvRtVBwJbtGIFQUlhxFSiXlL89mI2_cxEg0/exec';
    
    var CURRENT_USER_KEY = 'kanban_current_user_v2';

    // Sync status management
    function setSyncStatus(status, message) {
      var el = document.getElementById('syncStatus');
      if (!el) return;
      el.className = 'sync-status ' + status;
      el.textContent = message;
    }

    // ===== Utilities =====
    function getTodayStr() {
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, '0');
      var d = String(now.getDate()).padStart(2, '0');
      return "" + y + "-" + m + "-" + d;
    }

    function getDateOffsetStr(daysOffset) {
      var date = new Date();
      date.setDate(date.getDate() + daysOffset);
      var y = date.getFullYear();
      var m = String(date.getMonth() + 1).padStart(2, '0');
      var d = String(date.getDate()).padStart(2, '0');
      return "" + y + "-" + m + "-" + d;
    }

    function generateId() {
      return 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function generateUserId() {
      return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ===== GOOGLE SHEETS API =====
    function apiJsonp(action, params = {}) {
      return new Promise(function(resolve, reject) {
        var callbackName = 'jsonp_callback_' + Date.now();
        var urlParams = "mode=jsonp&action=" + encodeURIComponent(action) + "&callback=" + callbackName;
        for (var key in params) {
          if (params[key] !== undefined && params[key] !== null && params[key] !== '') {
            urlParams += "&" + encodeURIComponent(key) + "=" + encodeURIComponent(params[key]);
          }
        }
        var url = API_URL + "?" + urlParams;

        var script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
          setSyncStatus('error', '❌ Ошибка сети');
          reject(new Error('JSONP request failed'));
        };

        window[callbackName] = function(response) {
          if (response && response.ok) {
            setSyncStatus('ready', '✅ Синхронизировано');
            setTimeout(function() { return setSyncStatus('ready', ''); }, 3000);
            resolve(response.data || response);
          } else {
            setSyncStatus('error', '❌ Ошибка: ' + (response.error || 'Неизвестная'));
            reject(new Error(response.error || 'API error'));
          }
          delete window[callbackName];
          document.body.removeChild(script);
        };

        document.body.appendChild(script);
      });
    }

    function apiCall(action, payload) {
      setSyncStatus('syncing', '🔄 Синхронизация...');
      return apiJsonp(action, payload)['catch'](function(e) {
        setSyncStatus('error', '❌ Ошибка сети');
        console.error('API call error:', e);
        throw e;
      });
    }

    function getUsers() {
      return apiJsonp('getUsers').then(function(result) {
        setSyncStatus('ready', '✅ Загружено');
        setTimeout(function() { setSyncStatus('ready', ''); }, 2000);
        return Array.isArray(result) ? result : (result.ok ? (result.data || []) : []);
      })['catch'](function(e) {
        setSyncStatus('error', '❌ Ошибка загрузки');
        console.error('getUsers error:', e);
        return [];
      });
    }

    function addUser(name, telegramId, role) {
      return apiCall('addUser', {
        name: name,
        telegramId: telegramId || '',
        role: role || 'user'
      })['catch'](function(e) {
        console.error('addUser error:', e);
        throw e;
      });
    }

    function updateUser(userId, name, telegramId, role) {
      return apiCall('updateUser', {
        userId: userId,
        name: name,
        telegramId: telegramId || '',
        role: role || 'user'
      })['catch'](function(e) {
        console.error('updateUser error:', e);
        throw e;
      });
    }

    function deleteUser(userId) {
      return apiCall('deleteUser', { userId: userId })['catch'](function(e) {
        console.error('deleteUser error:', e);
        throw e;
      });
    }

    function addTask(title, plannedDate, assignedTo) {
      return apiCall('addTask', {
        title: title,
        plannedDate: plannedDate || '',
        assignedTo: assignedTo
        })['catch'](function(e) {
        console.error('addTask error:', e);
        throw e;
      });
    }

    function updateTask(taskId, updates) {
      return apiCall('updateTask', { id: taskId, updates })['catch'](function(e) {
        console.error('updateTask error:', e);
        throw e;
      });
    }

    function deleteTask(taskId) {
      return apiCall('deleteTask', { id: taskId })['catch'](function(e) {
        console.error('deleteTask error:', e);
        throw e;
      });
    }

    // ===== State =====
    var users = [];
    var selectedUserId = null;
    var editingUserId = null;

    // ===== Load & Render =====
    function loadUsers() {
      setSyncStatus('syncing', '🔄 Загрузка...');
      getUsers().then(function(result) {
        users = result;
        renderUserList();
      });
    }

    function renderUserList() {
      var container = document.getElementById('userListContainer');

      if (!Array.isArray(users)) {
        users = [];
      }

if (users.length === 0) {
        container.innerHTML = '<div class="loading"><p>Пользователей пока нет</p><p style="margin-top: 8px; font-size: 13px; color: #888;">Нажмите "Добавить пользователя" чтобы создать первого</p></div>';
        return;
      }

      var html = '<div class="user-list">';

      users.forEach(function(user) {
        var avatarLetter = user.name.charAt(0).toUpperCase();
        var roleLabel = user.role === 'admin' ? '👑 Админ' : '👤 Пользователь';
        var isSelected = user.userId === selectedUserId ? 'selected' : '';

        html += '<div class="user-card ' + isSelected + '" data-user-id="' + user.userId + '" onclick="selectUser(\'' + user.userId + '\')" ontouchstart="handleTouchStart(event, \'' + user.userId + '\')" ontouchend="handleTouchEnd(event, \'' + user.userId + '\')"><div class="user-avatar">' + avatarLetter + '</div><div class="user-info"><div class="user-name">' + escapeHtml(user.name) + '</div><div class="user-role">' + roleLabel + (user.telegramId ? ' • ' + escapeHtml(user.telegramId) : '') + '</div></div><div class="user-actions">';
          
          var canDelete = user.role !== 'admin' || users.filter(function(u) { return u.role === 'admin'; }).length > 1;
          if (canDelete) {
            html += '<button class="user-action-btn btn-delete" onclick="event.stopPropagation(); confirmDeleteUser(\'' + user.userId + '\')" title="Удалить">🗑️</button>';
          }
          html += '</div></div>';
        });

      html += '</div>';
      container.innerHTML = html;
    }

    function handleTouchStart(event, userId) {
      var card = event.currentTarget;
      card.classList.add('touch-hover');
      // Предотвращаем задержку клика на сенсорных устройствах
      event.preventDefault();
    }

    function handleTouchEnd(event, userId) {
      var card = event.currentTarget;
      setTimeout(function() {
        card.classList.remove('touch-hover');
      }, 100);
      // Выбираем пользователя сразу при отпускании пальца
      selectUser(userId);
    }

    function selectUser(userId) {
      selectedUserId = userId;
      renderUserList();
      
      var continueBtn = document.getElementById('continueBtn');
      continueBtn.classList.add('active');
    }

    function continueToBoard() {
      if (!selectedUserId) return;

      localStorage.setItem(CURRENT_USER_KEY, selectedUserId);

      var user = users.find(function(u) { return u.userId === selectedUserId; });
      if (user && user.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'index.html?userId=' + selectedUserId;
      }
    }

    // ===== Modal Functions =====
    function openAddUserModal() {
      editingUserId = null;
      document.getElementById('modalTitle').textContent = 'Новый пользователь';
      document.getElementById('userName').value = '';
      document.getElementById('userTelegram').value = '';
document.getElementById('userRole').value = 'user';
      document.getElementById('userModal').classList.add('show');
      setTimeout(function() { document.getElementById('userName').focus(); }, 100);
    }

    function openEditUserModal(userId) {
      editingUserId = userId;
      var user = users.find(function(u) { return u.userId === userId; });
      if (!user) return;
      
      document.getElementById('modalTitle').textContent = 'Редактирование';
      document.getElementById('userName').value = user.name || '';
      document.getElementById('userTelegram').value = user.telegramId || '';
      document.getElementById('userRole').value = user.role || 'user';
      document.getElementById('userModal').classList.add('show');
      setTimeout(function() { document.getElementById('userName').focus(); }, 100);
    }

    function openEditUserModal(userId) {
      editingUserId = userId;
      var user = users.find(function(u) { return u.userId === userId; });
      if (!user) return;
      
      document.getElementById('modalTitle').textContent = 'Редактирование';
      document.getElementById('userName').value = user.name || '';
      document.getElementById('userTelegram').value = user.telegramId || '';
      document.getElementById('userRole').value = user.role || 'user';
      document.getElementById('userModal').classList.add('show');
      setTimeout(function() { document.getElementById('userName').focus(); }, 100);
    }

    function closeUserModal() {
      document.getElementById('userModal').classList.remove('show');
      editingUserId = null;
    }

function saveUser() {
      var name = document.getElementById('userName').value.trim();
      var telegramId = document.getElementById('userTelegram').value.trim();
      var role = document.getElementById('userRole').value;

      if (!name) {
        alert('Введите имя');
        return;
      }

      var action = editingUserId ? 
        updateUser(editingUserId, name, telegramId, role) :
        addUser(name, telegramId, role);

      action.then(function() {
        closeUserModal();
        loadUsers();

        if (editingUserId && selectedUserId === editingUserId) {
          var updatedUser = users.find(function(u) { return u.userId === editingUserId; });
          if (updatedUser) selectedUserId = updatedUser.userId;
        }

        if (!editingUserId) {
          alert('✅ Пользователь "' + name + '" успешно добавлен!');
        }
      })['catch'](function(e) {
        alert('Ошибка: ' + e.message);
});
    }

    function confirmDeleteUser(userId) {
      if (!confirm('Вы уверены, что хотите удалить этого пользователя?')) return;

      deleteUser(userId).then(function() {
        if (selectedUserId === userId) {
          selectedUserId = null;
          document.getElementById('continueBtn').classList.remove('active');
        }
        loadUsers();
      })['catch'](function(e) {
        alert('Ошибка при удалении: ' + e.message);
      });
    }

    // ===== Event Listeners =====
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var modal = document.getElementById('userModal');
        if (modal.classList.contains('show')) {
          closeUserModal();
        }
      }
    });

    document.getElementById('userModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeUserModal();
      }
    });

    // ===== Initialization =====
    function init() {
      loadUsers();
      alert('init done');
    }

    init();
    alert('script loaded');
  <\/script>
</body>
</html>
